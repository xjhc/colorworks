<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Colorworks</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="rail rail-left">
        <header class="brand">
          <h1>Colorworks</h1>
          <span>Phase 1B</span>
        </header>

        <section class="panel">
          <h2>Asset</h2>
          <label class="file-picker">
            <input id="assetInput" type="file" accept="image/*">
            <span>Choose raster</span>
          </label>
          <dl class="meta-list">
            <div>
              <dt>Name</dt>
              <dd id="assetName">None</dd>
            </div>
            <div>
              <dt>Size</dt>
              <dd id="assetSize">-</dd>
            </div>
            <div>
              <dt>Checksum</dt>
              <dd id="assetChecksum">-</dd>
            </div>
          </dl>
        </section>

        <section class="panel">
          <h2>Presets</h2>
          <select id="presetSelect" class="select" aria-label="Presets list">
            <!-- Options dynamically populated -->
          </select>
          <div class="button-row" style="margin-bottom: 8px;">
            <button id="loadPreset" type="button">Apply</button>
            <button id="deletePreset" type="button" style="color: #e05638;">Delete</button>
          </div>
          <div style="border-top: 1px solid var(--line); padding-top: 8px;">
            <input id="newPresetName" class="text-input" placeholder="New Preset Name" aria-label="New preset name" style="margin-bottom: 4px;">
            <button id="savePreset" type="button" class="button" style="width: 100%;">Save Preset</button>
          </div>
        </section>

        <section class="panel">
          <h2>Recipe</h2>
          <input id="recipeName" class="text-input" value="Bayer proof" aria-label="Recipe name">
          <div class="button-row">
            <button id="saveRecipe" type="button">Save</button>
            <button id="reloadRecipe" type="button">Load</button>
          </div>
          <select id="recipeSelect" class="select" aria-label="Saved recipes"></select>
        </section>
      </aside>

      <section class="workspace">
        <div class="viewer-toolbar">
          <div class="inspector-tabs" style="display: flex; gap: 8px;">
            <button type="button" class="tab-btn active" data-tab="source" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Source</button>
            <button type="button" class="tab-btn" data-tab="tone_map" id="tabToneMap" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Tone Map</button>
            <button type="button" class="tab-btn" data-tab="edge_mask" id="tabEdgeMask" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Edge Mask</button>
            <button type="button" class="tab-btn" data-tab="final" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Final</button>
          </div>
          <div>
            <span id="renderStatus">Idle</span>
          </div>
        </div>

        <div class="viewer-container" style="min-height: 0; display: grid; background: var(--line);">
          <figure class="viewer" style="height: 100%;">
            <img id="mainViewer" alt="Workspace view">
            <div id="noArtifactMsg" style="display: none; padding: 20px; font-style: italic; color: var(--muted); background: var(--paper); border: 1px solid var(--line); border-radius: 4px;">Artifact not generated</div>
          </figure>
        </div>
      </section>

      <aside class="rail rail-right" style="overflow-y: auto;">
        <section class="panel">
          <h2>Pipeline</h2>
          <label class="control">
            <span>Select mode</span>
            <select id="pipelineSelect" class="select">
              <option value="ordered_bayer" selected>Phase 0: Bayer Dither</option>
              <option value="tonal_analyzer">Phase 1A: Tonal Wave</option>
              <option value="floyd_steinberg">Phase 1B: Floyd-Steinberg</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <h2>Parameters</h2>
          <div id="dynamicControls" style="display: flex; flex-direction: column; gap: 12px;">
            <!-- Dynamically generated controls based on schema -->
          </div>
        </section>

        <section class="panel" id="layersPanel">
          <h2>Layers</h2>
          <div style="margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line);">
            <label class="control" style="display: grid; grid-template-columns: 1fr auto; align-items: center;">
              <span>Paper Color</span>
              <input type="color" id="paperColorPicker" value="#f4ebd9" style="width: 40px; height: 24px; border: none; cursor: pointer; padding: 0;">
            </label>
          </div>
          <div id="layersList" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px;">
            <!-- Rendered dynamically -->
          </div>
          <button id="addLayerBtn" type="button" class="button" style="width: 100%;">Add Ink Layer</button>
        </section>

        <section class="panel">
          <h2>Export</h2>
          <dl class="meta-list">
            <div>
              <dt>Render</dt>
              <dd id="renderTime">-</dd>
            </div>
            <div>
              <dt>Output hash</dt>
              <dd id="outputChecksum">-</dd>
            </div>
          </dl>
          <a id="exportLink" class="button disabled" href="#" download>Export PNG</a>
        </section>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
