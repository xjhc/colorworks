<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Colorworks</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="rail rail-left">
        <header class="brand" style="display: flex; flex-direction: column; align-items: stretch; gap: 8px;">
          <div style="display: flex; align-items: baseline; justify-content: space-between;">
            <h1>Colorworks</h1>
            <span style="font-size: 12px; color: var(--muted);">Phase 5C</span>
          </div>
          <button id="enterGalleryBtn" type="button" class="button" style="min-height: 28px; padding: 4px 8px; font-size: 12px; width: 100%; border: 1px solid var(--accent); background: var(--accent); color: var(--paper);">Comparison Gallery</button>
        </header>

        <section class="panel">
          <h2>Asset</h2>
          <label class="file-picker">
            <input id="assetInput" type="file" accept="image/*">
            <span>Choose raster</span>
          </label>
          <dl class="meta-list">
            <div>
              <dt>Name</dt>
              <dd id="assetName">None</dd>
            </div>
            <div>
              <dt>Size</dt>
              <dd id="assetSize">-</dd>
            </div>
            <div>
              <dt>Checksum</dt>
              <dd id="assetChecksum">-</dd>
            </div>
          </dl>
        </section>

        <section class="panel">
          <h2>Presets</h2>
          <select id="presetSelect" class="select" aria-label="Presets list">
            <!-- Options dynamically populated -->
          </select>
          <div class="button-row" style="margin-bottom: 8px;">
            <button id="loadPreset" type="button">Apply</button>
            <button id="deletePreset" type="button" style="color: #e05638;">Delete</button>
          </div>
          <!-- Preset Metadata Display -->
          <div id="presetMeta" style="font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; display: none;">
            <div id="presetMetaDesc" style="font-style: italic; margin-bottom: 4px;"></div>
            <div id="presetMetaRec" style="margin-bottom: 2px;"></div>
            <div id="presetMetaTags"></div>
          </div>
          <div style="border-top: 1px solid var(--line); padding-top: 8px;">
            <input id="newPresetName" class="text-input" placeholder="New Preset Name" aria-label="New preset name" style="margin-bottom: 4px;">
            <button id="savePreset" type="button" class="button" style="width: 100%;">Save Preset</button>
          </div>
        </section>

        <section class="panel">
          <h2>Recipe</h2>
          <input id="recipeName" class="text-input" value="Bayer proof" aria-label="Recipe name">
          <div class="button-row">
            <button id="saveRecipe" type="button">Save</button>
            <button id="reloadRecipe" type="button">Load</button>
          </div>
          <select id="recipeSelect" class="select" aria-label="Saved recipes"></select>
        </section>
      </aside>

      <section class="workspace">
        <div class="viewer-toolbar">
          <div class="inspector-tabs" style="display: flex; gap: 8px; align-items: center;">
            <button type="button" class="tab-btn active" data-tab="source" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Source</button>
            <button type="button" class="tab-btn" data-tab="tone_map" id="tabToneMap" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Tone Map</button>
            <button type="button" class="tab-btn" data-tab="edge_mask" id="tabEdgeMask" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Edge Mask</button>
            <button type="button" class="tab-btn" data-tab="orientation_field" id="tabOrientation" style="min-height: 28px; padding: 4px 8px; font-size: 13px; display: none;">Orientation</button>
            <button type="button" class="tab-btn" data-tab="final" style="min-height: 28px; padding: 4px 8px; font-size: 13px;">Final</button>
          </div>
          <div id="vectorControls" style="display: none; align-items: center; gap: 4px; margin-left: 12px;">
            <label for="vectorViewSelect" style="font-size: 12px; color: var(--muted); cursor: pointer;">View:</label>
            <select id="vectorViewSelect" class="select" style="min-height: 24px; padding: 0 4px; font-size: 12px; margin: 0; width: auto;">
              <option value="orientation_hsv" selected>HSV Angle</option>
              <option value="glyph_field">Glyphs</option>
            </select>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span id="renderStatus">Idle</span>
            <button id="cancelRenderBtn" type="button" class="button" style="display: none; min-height: 20px; padding: 2px 6px; font-size: 11px; margin: 0; line-height: 1; border-color: var(--muted); color: var(--muted);">Cancel</button>
          </div>
        </div>

        <div class="viewer-container" style="min-height: 0; display: grid; background: var(--line);">
          <figure class="viewer" style="height: 100%;">
            <img id="mainViewer" alt="Workspace view">
            <div id="noArtifactMsg" style="display: none; padding: 20px; font-style: italic; color: var(--muted); background: var(--paper); border: 1px solid var(--line); border-radius: 4px;">Artifact not generated</div>
          </figure>
        </div>
      </section>

      <aside class="rail rail-right" style="overflow-y: auto;">
        <section class="panel">
          <h2>Pipeline</h2>
          <label class="control">
            <span>Select mode</span>
            <select id="pipelineSelect" class="select">
              <option value="ordered_bayer" selected>Phase 0: Bayer Dither</option>
              <option value="tonal_analyzer">Phase 1A: Tonal Wave</option>
              <option value="floyd_steinberg">Phase 1B: Floyd-Steinberg</option>
              <option value="structure_analyzer">Phase 2: Structure Analyzer</option>
              <option value="cvt_stippling">Phase 3: CVT Stippling</option>
              <option value="dbs">Phase 4A: Direct Binary Search</option>
              <option value="saed">Phase 4B: Structure-Aware Error Diffusion</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <h2>Parameters</h2>
          <div id="dynamicControls" style="display: flex; flex-direction: column; gap: 12px;">
            <!-- Dynamically generated controls based on schema -->
          </div>
        </section>

        <section class="panel" id="layersPanel">
          <h2>Layers</h2>
          <div style="margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line);">
            <label class="control" style="display: grid; grid-template-columns: 1fr auto; align-items: center;">
              <span>Paper Color</span>
              <input type="color" id="paperColorPicker" value="#f4ebd9" style="width: 40px; height: 24px; border: none; cursor: pointer; padding: 0;">
            </label>
          </div>
          <div id="layersList" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px;">
            <!-- Rendered dynamically -->
          </div>
          <button id="addLayerBtn" type="button" class="button" style="width: 100%;">Add Ink Layer</button>
        </section>

        <section class="panel">
          <h2>Export</h2>
          <dl class="meta-list">
            <div>
              <dt>Render</dt>
              <dd id="renderTime">-</dd>
            </div>
            <div>
              <dt>Output hash</dt>
              <dd id="outputChecksum">-</dd>
            </div>
          </dl>
          <div class="button-row" style="display: flex; gap: 8px;">
            <a id="exportLink" class="button disabled" href="#" download style="flex: 1; text-align: center; display: inline-flex; align-items: center; justify-content: center; min-height: 32px;">Export PNG</a>
            <button id="exportSvgBtn" type="button" class="button disabled" style="flex: 1; min-height: 32px;">Export SVG</button>
          </div>
        </section>
      </aside>

      <!-- Gallery View (initially hidden) -->
      <section id="galleryView" style="display: none; flex-direction: column; min-height: 100vh; padding: 24px; background: var(--panel); overflow-y: auto; gap: 20px;">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--line); padding-bottom: 16px;">
          <div style="display: flex; align-items: center; gap: 16px;">
            <h1 style="margin: 0; font-size: 24px; font-weight: 760;">Comparison Gallery</h1>
            <span style="color: var(--muted); font-size: 14px;">Real-Image Validation</span>
          </div>
          <div style="display: flex; gap: 12px; align-items: center;">
            <label style="font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px;">
              Fixture:
              <select id="galleryFixtureFilter" class="select" style="min-height: 32px; width: auto; margin: 0; padding: 0 8px; font-size: 13px;">
                <option value="all">All Fixtures</option>
              </select>
            </label>
            <label style="font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px;">
              Kind:
              <select id="galleryKindFilter" class="select" style="min-height: 32px; width: auto; margin: 0; padding: 0 8px; font-size: 13px;">
                <option value="all">All Kinds</option>
                <option value="algorithm">Algorithms Only</option>
                <option value="preset">Presets Only</option>
              </select>
            </label>
            <button id="refreshGalleryBtn" type="button" class="button" style="min-height: 32px; font-size: 13px; padding: 0 12px; margin: 0;">Refresh</button>
            <button id="exitGalleryBtn" type="button" class="button" style="min-height: 32px; font-size: 13px; padding: 0 12px; margin: 0; background: var(--accent); border-color: var(--accent);">Back to Workspace</button>
          </div>
        </header>

        <div id="galleryContent" style="display: flex; flex-direction: column; gap: 28px;">
          <!-- Content populated dynamically -->
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
