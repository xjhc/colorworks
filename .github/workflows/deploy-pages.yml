name: Deploy Colorworks to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Project Pages default for a repo named `colorworks`.
  # Change to "/" when using a custom domain.
  PAGES_BASE: /colorworks/

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: colorworks/pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: colorworks/pages/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        # vite.config.ts reads `base` from PAGES_BASE (set above), so no --base
        # flag is needed — and a CLI flag wouldn't forward cleanly through the
        # `tsc --noEmit && vite build` script anyway.
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: colorworks/pages/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
